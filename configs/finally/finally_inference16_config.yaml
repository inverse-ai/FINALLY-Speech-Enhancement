inference:
    save_samples: true
    trainer: finally_trainer
    metrics: ["utmos", "dnsmos", "wb_pesq", "stoi", "si_sdr"]

models:
    finally_gen:
        checkpoint_path: experiment/checkpoints/stage2_urgent_data_70k_MetricGAN/finally_gen/finally_gen_checkpoint_80000_stage2_urgent_data_70k_MetricGAN.pth
        args:
            use_upsamplewaveunet: false
    