exp:
  project_name: FINALLY
  exp_dir: experiment
  device: cuda:0
  seed: 1234
mel:
  segment_size: 16384
  num_mels: 80
  n_fft: 1024
  hop_size: 256
  win_size: 1024
  in_sr: 16000
  out_sr: 32000
  fmin: 0
  fmax: 8000
  fmax_for_loss: null
data:
  train_dataset: augmented_daps
  train_dataset_args:
    augs_conf:
    - name: noise
      args:
        root: datasets/DNS_noise/datasets_fullband/noise_fullband
        noise_files_path:
          train: datasets/metadata/DNS_noise/train_files.txt
          val: datasets/metadata/DNS_noise/val_files.txt
    - name: impulse_response
      args:
        root: datasets/micro_ir
        ir_files_path:
          train: datasets/metadata/micro_ir/train_files.txt
          val: datasets/metadata/micro_ir/val_files.txt
    - name: impulse_response
      args:
        root: datasets/DNS_ir/datasets_fullband/impulse_responses/SLR26/simulated_rirs_48k
        ir_files_path:
          train: datasets/metadata/DNS_ir/train_files.txt
          val: datasets/metadata/DNS_ir/val_files.txt
        prob: 0.8
    - name: acrusher
      args:
        prob: 0.25
    - name: crystalizer
      args:
        prob: 0.4
    - name: vibrato
      args:
        prob: 0.15
    - name: flanger
      args:
        prob: 0.15
    - name: codec
      args:
        prob: 0.45
    - name: clipping
      args:
        prob: 0.4
    - name: packet_loss
      args:
        prob: 0.15
  train_data_root: ../../Data/Data_48K
  train_data_file_path: ../../Data/Data_48K/filenames.txt
  val_dataset: vctk-demand
  val_dataset_args:
    clean_wavs_dir: clean_testset_wav
    noisy_wavs_dir: noisy_testset_wav
  val_data_root: datasets/VCTK-Demand
  val_data_file_path: datasets/metadata/VCTK-Demand/files.txt
  train_batch_size: 32
  workers: 20
train:
  trainer: finally_trainer
  trainer_args:
    sub_batch_size: 4
  val_metrics: ["dnsmos", "utmos", "vcr", "wb_pesq"]
  start_step: 7001
  steps: 400000
  log_step: 500
  checkpoint_step: 1000
  val_step: 1000
models:
  finally_gen:
    optimizer:
      name: adamW
      args:
        lr: 0.0002
        beta1: 0.8
        beta2: 0.99
    scheduler:
      name: exponential
      args:
        gamma: 0.995
        reduce_time: period
        step_period: 200
        warmup_steps: 2000
    checkpoint_path: experiment/checkpoints/stage3_URGENT_aug_32K_2/finally_gen/finally_gen_checkpoint_7000_stage3_URGENT_aug_32K_2.pth
    load_optimizer_from_checkpoint: true
    args:
      use_upsamplewaveunet: true
    losses:
      lmos:
        coef: 0.5
      gen_loss:
        coef: 5
      feature_loss:
        coef: 15.0
      utmos:
        coef: 0.5
  ms-stft_disc:
    optimizer:
      name: adamW
      args:
        lr: 0.0002
        beta1: 0.5
        beta2: 0.999
    scheduler:
      name: exponential
      args:
        gamma: 0.995
        reduce_time: period
        step_period: 200
    checkpoint_path: experiment/checkpoints/stage3_URGENT_aug_32K_2/ms-stft_disc/ms-stft_disc_checkpoint_6000_stage3_URGENT_aug_32K_2.pth
    args:
      filters: 64
    losses:
      disc_loss:
        coef: 1.0