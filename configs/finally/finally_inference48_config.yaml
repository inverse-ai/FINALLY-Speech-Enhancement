#     inference_data_file_path: "../../Data/Data_48K/small_train_data_filenames.txt"
#     workers: 1
#     train_batch_size: 32

inference:
    save_samples: true
    trainer: finally_trainer
    metrics: []

models:
    finally_gen:
        checkpoint_path: experiment/checkpoints/stage3_norm/finally_gen/finally_gen_checkpoint_28000_stage3_norm.pth
        args:
          use_upsamplewaveunet: true
    