# DDP Training Configuration for Stage 3
# Launch with: torchrun --nproc_per_node=2 train_ddp.py exp.config_path=configs/stage3_config_ddp.yaml

exp:
    project_name: FINALLY
    exp_dir: experiment
    device: cuda:0  # Will be overridden by DDP launcher based on LOCAL_RANK
    seed: 1234
    stage: 3

mel:
    segment_size: 196608
    num_mels: 80
    n_fft: 1024
    hop_size: 256
    win_size: 1024
    in_sr: 16000
    out_sr: 48000
    fmin: 0
    fmax: 8000
    fmax_for_loss: null

data:
    train_dataset_args: ${include:configs/dataset_augs.yaml}

    train_data_root: /mnt/SadaHati/Home/SE/FINALLY-Speech-Enhancement/datasets/DAPS/daps
    train_data_file_path: /mnt/SadaHati/Home/SE/FINALLY-Speech-Enhancement/datasets/metadata/DAPS/files.txt

    val_dataset_args:
        clean_wavs_dir: clean
        noisy_wavs_dir: noisy
    val_data_root: /mnt/SadaHati/Home/SE/FINALLY-Speech-Enhancement/datasets/VCTK-Demand
    val_data_file_path: /mnt/SadaHati/Home/SE/FINALLY-Speech-Enhancement/datasets/metadata/VCTK-Demand/files.txt

    # DDP IMPORTANT: This is batch size PER GPU (what fits in VRAM)
    train_batch_size: 1
    workers: 6

train:
    # DDP: Effective batch size = train_batch_size × world_size × accum_steps
    # With 2 GPUs: 32 = 1 × 2 × 16 accumulation steps
    effective_batch_size: 32

    val_metrics: ["utmos", "wvmos", "dnsmos", "wb_pesq", "stoi", "si_sdr"]
    start_step: 25601
    steps: 80000
    checkpoint_step: 100
    val_step: 100

gen:
    optimizer:
        args:
            lr: 0.0002
            beta1: 0.8
            beta2: 0.99
    scheduler:
        args:
            gamma: 0.995
            warmup_steps: 2000
            step_period: 200

    checkpoint_path: /mnt/SadaHati/Home/Projects/Fahim/finally-speech-enhancement/experiment/checkpoints/stage3_ddp_norm/gen/gen_checkpoint_25600_stage3_ddp_norm.pth
    load_optimizer_from_checkpoint: true

    args:
        use_upsamplewaveunet: true

    losses:
        wavlm_loss:
            coef: 50
        stft_loss:
            coef: 0.5
        gen_loss:
            coef: 5
        feature_loss:
            coef: 15.0
        utmos:
            coef: 20
        pesq:
            coef: 2

disc:
    optimizer:
        args:
            lr: 0.0002
            beta1: 0.5
            beta2: 0.999

    scheduler:
        args:
            gamma: 0.995
            step_period: 200

    checkpoint_path: /mnt/SadaHati/Home/Projects/Fahim/finally-speech-enhancement/experiment/checkpoints/stage3_ddp_norm/disc/disc_checkpoint_25600_stage3_ddp_norm.pth

    args:
        filters: 64
    losses:
        disc_loss:
            coef: 1.0
    n_disc_iters: 2
